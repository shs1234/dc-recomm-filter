<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>DC 추천수 필터</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 12px; min-width: 240px }
    label { display: block; margin: 8px 0 }
    input[type="number"] { width: 80px }
    button { margin-top: 8px }
  </style>
</head>
<body>
  <h3>DC 추천수 필터</h3>
  <label><input type="checkbox" id="enabled"> 필터 사용</label>
  <label>최소 추천수: <input type="number" id="threshold" min="0" max="1000" value="10"></label>
  <button id="save">저장</button>
  <p id="status" style="color:green"></p>
  <script src="popup.js"></script>
</body>
</html>
